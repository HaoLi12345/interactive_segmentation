# Smoke training config: 2 epochs, tiny subsets, just to verify forward+backward+checkpoint round-trip.
experiment:
  name: smoke
  seed: 42
  output_dir: outputs/smoke

data:
  dataset: kits21
  data_root: /data/h_oguz_lab/lih30/interactive_seg_data
  split_pkl: splits/kits.pkl
  fold: 0
  spacing: [1.5, 1.5, 1.5]
  patch_size: [128, 128, 128]
  intensity_range: [-200, 250]
  num_workers: 2

model:
  arch: prism
  n_prompt_encoders: 4
  image_encoder:
    type: vit3d
    in_channels: 1
    sam_checkpoint: ""
  prompt_encoder:
    click_states: 2
  mask_decoder:
    multiple_outputs: true
    img_size: 96
    num_classes: 2
  refine: true

click:
  strategy: random
  three_state: false
  iter_nums: 5
  initial_clicks: 1
  n_pos_train: 50
  n_neg_train: 50
  n_pos_val: 10
  n_neg_val: 10

train:
  epochs: 2
  batch_size: 1
  lr: 4.0e-4
  optimizer: adamw
  weight_decay: 0.0
  scheduler: linear
  amp: false
  max_steps_per_epoch: 5
  device: cuda:0
  auto_mode_prob: 0.0

eval:
  protocol: prism_n_click
  click_counts: [1, 3, 5]
  metrics: [dice]

log:
  every_n_steps: 1
  save_overlay_every_n_epochs: 1
  use_tensorboard: false
