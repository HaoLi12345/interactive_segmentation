# Base configuration for interactive_seg.
# Per R-Config.NewExp: copy this file (not the directory) into configs/exp/<name>/config.yaml
# and edit. Do not `cp -r configs/base/`.

experiment:
  name: smoke_test               # required at runtime; override via --name
  seed: 42
  output_dir: outputs/${experiment.name}

# ----- Data -----
data:
  dataset: kits21                # one of: kits21, msd_colon
  data_root: /data/h_oguz_lab/lih30/interactive_seg_data
  split_pkl: splits/kits.pkl
  fold: 0                        # 0..4 from PRISM 5-fold split
  spacing: [1.5, 1.5, 1.5]       # mm; PRISM default
  patch_size: [128, 128, 128]
  intensity_range: [-200, 250]   # CT abdominal window; PRISM default
  num_workers: 4                 # R-Process.2 — must be ≤ 4

# ----- Model -----
model:
  arch: prism                    # selectively ported from MedICL-VU/PRISM
  image_encoder:
    type: vit3d
    in_channels: 1
  prompt_encoder:
    click_states: 2              # set 3 to enable VISTA3D-style three-state click
  mask_decoder:
    multiple_outputs: true       # SAM-style multi-mask hypotheses
  refine: true                   # iterative refinement head

# ----- Click sampling (our contribution lives here) -----
click:
  strategy: random               # random | uncertainty | fnfp_top1 | boundary | eig
  three_state: false             # gated by --click.three_state (borrowed from VISTA3D)
  iter_nums: 5                   # number of refinement iterations during training
  initial_clicks: 1              # positive-only on iter 0

# ----- Prompt curriculum (borrowed from nnInteractive) -----
curriculum:
  enabled: false
  schedule:
    - {epoch_range: [0, 20],  prompts: [point]}
    - {epoch_range: [20, 50], prompts: [point, scribble]}
    - {epoch_range: [50, 80], prompts: [point, scribble, box]}

# ----- Training -----
train:
  epochs: 100
  batch_size: 2
  lr: 1.0e-4
  optimizer: adamw
  weight_decay: 1.0e-2
  scheduler: cosine
  warmup_epochs: 5
  amp: true
  auto_mode_prob: 0.0            # set > 0 for VISTA3D-style auto+click dual training

# ----- Evaluation -----
eval:
  protocol: prism_n_click        # use PRISM's evaluation/ logic for apples-to-apples
  click_counts: [1, 3, 5, 10]
  metrics: [dice, nsd]

# ----- Logging -----
log:
  every_n_steps: 50
  save_overlay_every_n_epochs: 5
  use_tensorboard: true
